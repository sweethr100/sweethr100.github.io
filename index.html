<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심호령 Introduction</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./seml.webp">
    <link rel="apple-touch-icon" href="./seml.webp">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-brands/css/uicons-brands.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script>
        // 페이지 깜빡임 방지: 로드 전에 저장된 테마 적용
        (function() {
            const saved = localStorage.getItem('theme') || 'auto';
            if (saved === 'dark') {
                document.documentElement.removeAttribute('data-theme');
            } else if (saved === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else if (saved === 'auto') {
                if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                    document.documentElement.setAttribute('data-theme', 'light');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                }
            }
        })();
    </script>
</head>
<body>
    <a href="./index.html" class="floating-logo">심호령</a>
    <nav class="navbar floating-nav">
        <ul class="nav-links">
            <li>
                <a href="./index.html" class="active">
                    <span>프로필</span>
                </a>
            </li>
            <li>
                <a href="./work/index.html">
                    <span>앱</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="theme-controls">
        <div class="theme-bar floating-nav">
            <button class="theme-toggle" id="themeToggle" aria-label="테마 전환">
                <div class="theme-icon-wrapper" style="font-size: 1.5rem; line-height: 1;">🌙</div>
            </button>
            <button class="settings-btn" id="settingsBtn" aria-label="설정">
                <i class="fi fi-rr-settings"></i>
            </button>
        </div>

        <!-- Theme Settings Dropdown -->
        <div class="settings-dropdown" id="settingsModal">
            <div class="dropdown-header">
                <h3>설정</h3>
            </div>
            <div class="dropdown-body">
                <div class="setting-item">
                    <label for="themeSelect">테마 설정</label>
                    <select id="themeSelect" class="custom-select">
                        <option value="light">라이트 모드</option>
                        <option value="dark">다크 모드</option>
                        <option value="auto">시스템 설정 사용</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <main class="container">
        <section class="hero">
            <div class="profile-wrapper">
                <img src="./seml.webp" alt="Profile" class="profile-img">
            </div>
            <div class="hero-text">
                <h1 class="title">심호령</h1>
            </div>
        </section>

        </section>



        <section class="featured-section">
            <h2 class="section-title">YouTube 대표 영상</h2>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/RiYA19LdzSc" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
            <div class="profile-link-container">
                <a href="https://www.youtube.com/@%EC%84%B8%EB%AF%88" target="_blank" class="profile-btn youtube-profile-btn">
                    <i class="fi fi-brands-youtube"></i>
                    <span>YouTube 채널 방문</span>
                </a>
            </div>
        </section>

        <!-- Discord Live Activity Section -->
        <section class="discord-section">
            <h2 class="section-title">Discord 활동 상태</h2>
            <div class="discord-wide-widget" id="discordWideWidget">
                <div class="discord-header">
                    <div class="discord-avatar-wrapper">
                        <img id="discordAvatar" src="./seml.webp" alt="Avatar" class="discord-avatar">
                        <span class="status-indicator-large" id="discordStatus"></span>
                    </div>
                    <div class="discord-user-info">
                        <div class="user-main">
                            <h3 id="discordGlobalName">로딩 중...</h3>
                        </div>
                        <p id="discordCustomStatus" class="discord-custom-status">💬 상태 메시지를 불러오는 중...</p>
                    </div>
                </div>
                <div class="discord-header-separator">
                    <button class="discord-copy-btn-compact" onclick="copyDiscordId()">
                        <i class="fi fi-rr-copy"></i> Discord ID 복사하기
                    </button>
                </div>
                <div class="discord-body" id="discordBody">
                    <div class="activity-label-wrapper">
                        <span id="activityTypeLabel" class="activity-label">현재 활동</span>
                        <div id="activityTimeWrapper" class="activity-time-banner" style="display: none;">
                            <span id="activityTime"></span>
                        </div>
                    </div>
                    <div class="activity-content-wrapper">
                        <div id="activityImageWrapper" class="activity-image-wrapper">
                            <img id="activityLargeImage" class="activity-large-image" src="" alt="">
                            <img id="activitySmallImage" class="activity-small-image" src="" alt="" style="display: none;">
                        </div>
                        <div class="activity-details">
                            <div id="discordActivity" class="discord-activity-name">활동 없음</div>
                            <div id="discordActivityDetail" class="discord-activity-details-text"></div>
                            <div id="discordActivityState" class="discord-activity-state-text"></div>
                            <div id="discordPartyInfo" class="discord-party-info"></div>
                            <div id="spotifyProgress" class="spotify-progress-container" style="display: none;">
                                <div class="progress-bar">
                                    <div id="spotifyProgressBar" class="progress-fill"></div>
                                </div>
                                <div class="progress-time">
                                    <span id="spotifyCurrent">0:00</span>
                                    <span id="spotifyDuration">0:00</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        </section>

        <!-- Instagram Section -->
        <section class="instagram-section">
            <h2 class="section-title">Instagram</h2>
            <div class="social-links-grid">
                <a href="https://www.instagram.com/5_ryung/" target="_blank" class="insta-profile-card">
                    <div class="insta-card-header">
                        <div class="insta-card-avatar-wrapper">
                            <img src="./insta_profile.jpg" alt="Instagram Profile" class="insta-card-avatar">
                        </div>
                        <div class="insta-card-info">
                            <h3>5_ryung</h3>
                        </div>
                    </div>
                    <div class="insta-card-btn">프로필 방문</div>
                </a>
            </div>
        </section>

        <section class="github-section">
            <h2 class="section-title">GitHub 최근 활동</h2>
            <div class="github-list" id="githubRepoList">
                <p style="text-align: center; color: var(--text-secondary);">Loading repositories...</p>
            </div>
            
            <div class="profile-link-container">
                <a href="https://github.com/sweethr100" target="_blank" class="profile-btn github-profile-btn">
                    <i class="fi fi-brands-github"></i>
                    <span>GitHub 프로필 방문</span>
                </a>
            </div>
        </section>


    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">© 2026 심호령. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 테마 및 설정 기능
        const themeToggle = document.getElementById('themeToggle');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsDropdown = document.getElementById('settingsModal');
        const themeSelect = document.getElementById('themeSelect');
        const html = document.documentElement;

        function updateThemeIcon() {
            const savedTheme = localStorage.getItem('theme') || 'auto';
            const iconWrapper = themeToggle.querySelector('.theme-icon-wrapper');
            if (!iconWrapper) return;

            if (savedTheme === 'auto') {
                iconWrapper.textContent = '🌓';
            } else {
                const isDark = html.getAttribute('data-theme') !== 'light';
                iconWrapper.textContent = isDark ? '🌙' : '☀️';
            }
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                html.removeAttribute('data-theme');
            } else if (theme === 'light') {
                html.setAttribute('data-theme', 'light');
            } else if (theme === 'auto') {
                if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                    html.setAttribute('data-theme', 'light');
                } else {
                    html.removeAttribute('data-theme');
                }
            }
            updateThemeIcon();
            if (typeof updateGitHubImages === 'function') updateGitHubImages();
            
            // 드랍다운 상태 동기화
            const savedTheme = localStorage.getItem('theme') || 'auto';
            if (themeSelect.value !== savedTheme) {
                themeSelect.value = savedTheme;
            }
        }

        // 초기 테마 설정 및 드랍다운 동기화
        const initialTheme = localStorage.getItem('theme') || 'auto';
        themeSelect.value = initialTheme;
        applyTheme(initialTheme);

        // 테마 토글 버튼 (라이트 <-> 다크만 전환)
        themeToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            const isDark = html.getAttribute('data-theme') !== 'light';
            const newTheme = isDark ? 'light' : 'dark';
            
            localStorage.setItem('theme', newTheme);
            themeSelect.value = newTheme;
            applyTheme(newTheme);
        });

        // 설정 버튼 클릭 시 드롭다운 토글
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsBtn.classList.toggle('active');
            settingsDropdown.classList.toggle('active');
        });

        // 외부 클릭 시 드롭다운 닫기
        document.addEventListener('click', (e) => {
            if (!settingsDropdown.contains(e.target) && e.target !== settingsBtn) {
                settingsBtn.classList.remove('active');
                settingsDropdown.classList.remove('active');
            }
        });

        // 테마 선택 드랍다운 변경 시
        themeSelect.addEventListener('change', (e) => {
            const selectedTheme = e.target.value;
            localStorage.setItem('theme', selectedTheme);
            applyTheme(selectedTheme);
        });

        // 시스템 테마 변경 실시간 감지
        window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {
            const savedTheme = localStorage.getItem('theme') || 'auto';
            if (savedTheme === 'auto') {
                applyTheme('auto');
            }
        });

        // 깃허브 실시간 레포지토리 로드 기능
        async function fetchGitHubRepos() {
            const listContainer = document.getElementById('githubRepoList');
            if (!listContainer) return;
            
            try {
                const response = await fetch('https://api.github.com/users/sweethr100/repos?sort=pushed&per_page=3');
                if (!response.ok) throw new Error('Network response was not ok');
                const repos = await response.json();
                
                listContainer.innerHTML = '';
                
                repos.forEach(repo => {
                    const langClass = repo.language ? repo.language.toLowerCase() : 'unknown';
                    const langBadge = repo.language ? `<span class="lang-badge ${langClass}">${repo.language}</span>` : '';
                    const description = repo.description || '설명이 없습니다.';
                    
                    const stars = repo.stargazers_count > 0 ? `<span class="repo-stat" title="별표 수"><i class="fi fi-rr-star"></i> ${repo.stargazers_count}</span>` : '';
                    const forks = repo.forks_count > 0 ? `<span class="repo-stat" title="포크 수"><i class="fi fi-rr-code-branch"></i> ${repo.forks_count}</span>` : '';
                    const dateObj = new Date(repo.pushed_at);
                    const dateStr = `${dateObj.getFullYear()}.${String(dateObj.getMonth() + 1).padStart(2, '0')}.${String(dateObj.getDate()).padStart(2, '0')}`;
                    const issues = repo.open_issues_count > 0 ? `<span class="repo-stat" title="열린 이슈"><i class="fi fi-rr-info"></i> ${repo.open_issues_count}</span>` : '';
                    
                    const cardHTML = `
                        <a href="${repo.html_url}" target="_blank" class="github-list-card">
                            <div class="github-card-content">
                                <h3>${repo.name}</h3>
                                <p>${description}</p>
                                <div class="repo-meta">
                                    <span class="repo-stat update-date" title="최근 업데이트 날짜">업데이트: ${dateStr}</span>
                                    ${stars}
                                    ${forks}
                                    ${issues}
                                </div>
                            </div>
                            ${langBadge}
                        </a>
                    `;
                    listContainer.insertAdjacentHTML('beforeend', cardHTML);
                });
            } catch (error) {
                console.error('Failed to fetch GitHub repos:', error);
                listContainer.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">GitHub 데이터를 불러오지 못했습니다.</p>';
            }
        }

        // 디스코드 고유 ID
        const DISCORD_ID = "727492973666893914";

        let spotifyInterval;
        let activityInterval;

        function formatTime(ms) {
            const minutes = Math.floor(ms / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        async function updateDiscordStatus() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await response.json();
                
                const widget = document.getElementById('discordWideWidget');
                const avatar = document.getElementById('discordAvatar');
                const statusIndicator = document.getElementById('discordStatus');
                const activityText = document.getElementById('discordActivity');
                const activityDetail = document.getElementById('discordActivityDetail');
                const activityParty = document.getElementById('discordPartyInfo');
                const activityImageWrapper = document.getElementById('activityImageWrapper');
                const customStatusText = document.getElementById('discordCustomStatus');
                const activityTime = document.getElementById('activityTime');
                const spotifyProgress = document.getElementById('spotifyProgress');
                const globalNameText = document.getElementById('discordGlobalName');
                const activityLabel = document.getElementById('activityTypeLabel');
                
                if (!statusIndicator || !activityText) return;

                // 초기화
                clearInterval(spotifyInterval);
                clearInterval(activityInterval);
                if(activityTime) activityTime.innerText = '';
                if(activityParty) activityParty.innerText = '';
                if(spotifyProgress) spotifyProgress.style.display = 'none';
                widget.classList.remove('theme-spotify', 'theme-gaming');

                // 1. 프로필 정보 업데이트
                statusIndicator.className = 'status-indicator-large ' + data.discord_status;
                globalNameText.innerText = data.discord_user.global_name || data.discord_user.username || '심호령';
                
                if (data.discord_user.avatar) {
                    avatar.src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png?size=256`;
                }

                // 2. 커스텀 상태 메시지 업데이트
                const customStatus = data.activities.find(a => a.type === 4);
                if (customStatusText) {
                    customStatusText.innerHTML = customStatus ? `💬 ${customStatus.state}` : (data.discord_status === 'offline' ? '' : '💬 상태 메시지 없음');
                }

                // 3. 주요 활동 및 이미지 업데이트
                const activities = data.activities.filter(a => a.type !== 4);
                
                const typeMap = {
                    0: '플레이 중',
                    1: '스트리밍 중',
                    2: '듣는 중',
                    3: '시청 중',
                    5: '경쟁 중'
                };

                if (data.listening_to_spotify) {
                    const spotify = data.spotify;
                    widget.classList.add('theme-spotify');
                    activityLabel.innerText = 'Spotify 듣는 중';
                    activityImageWrapper.innerHTML = `<img src="${spotify.album_art_url}" alt="Spotify Album Art">`;
                    activityImageWrapper.style.display = 'block';
                    activityText.innerText = spotify.song;
                    activityDetail.innerText = `${spotify.artist} - ${spotify.album}`;
                    activityText.classList.add('active');

                    spotifyProgress.style.display = 'block';
                    const updateSpotify = () => {
                        const now = Date.now();
                        const total = spotify.timestamps.end - spotify.timestamps.start;
                        const progress = now - spotify.timestamps.start;
                        const percent = Math.min(100, (progress / total) * 100);
                        
                        document.getElementById('spotifyProgressBar').style.width = `${percent}%`;
                        document.getElementById('spotifyCurrent').innerText = formatTime(progress);
                        document.getElementById('spotifyDuration').innerText = formatTime(total);
                    };
                    updateSpotify();
                    spotifyInterval = setInterval(updateSpotify, 1000);

                } else if (activities.length > 0) {
                    const activity = activities[0];
                    widget.classList.add('theme-gaming');

                    activityLabel.innerText = typeMap[activity.type] || '활동 중';
                    
                    // 활동 텍스트 정보 배치 (디스코드 공식 위계)
                    activityText.innerText = activity.name;
                    activityDetail.innerText = activity.details || '';
                    const stateElement = document.getElementById('discordActivityState');
                    if (stateElement) stateElement.innerText = activity.state || '';
                    
                    // 활동 이미지 처리 (Large & Small)
                    const largeImage = document.getElementById('activityLargeImage');
                    const smallImage = document.getElementById('activitySmallImage');
                    
                    if (activity.assets && activity.assets.large_image) {
                        let largeUrl = '';
                        const asset = activity.assets.large_image;
                        if (asset.startsWith('mp:external/')) {
                            largeUrl = `https://media.discordapp.net/external/${asset.split('mp:external/')[1]}`;
                        } else if (asset.startsWith('spotify:')) {
                            largeUrl = `https://i.scdn.co/image/${asset.split('spotify:')[1]}`;
                        } else if (activity.application_id) {
                            largeUrl = `https://cdn.discordapp.com/app-assets/${activity.application_id}/${asset}.png`;
                        }
                        
                        if (largeUrl) {
                            largeImage.src = largeUrl;
                            largeImage.style.display = 'block';
                            activityImageWrapper.style.display = 'block';
                        }
                    } else {
                        largeImage.style.display = 'none';
                    }

                    if (activity.assets && activity.assets.small_image) {
                        let smallUrl = '';
                        const asset = activity.assets.small_image;
                        if (asset.startsWith('mp:external/')) {
                            smallUrl = `https://media.discordapp.net/external/${asset.split('mp:external/')[1]}`;
                        } else if (activity.application_id) {
                            smallUrl = `https://cdn.discordapp.com/app-assets/${activity.application_id}/${asset}.png`;
                        }
                        
                        if (smallUrl) {
                            smallImage.src = smallUrl;
                            smallImage.style.display = 'block';
                        }
                    } else {
                        smallImage.style.display = 'none';
                    }

                    if (activity.party && activity.party.size) {
                        activityParty.innerText = `파티: ${activity.party.size[0]}/${activity.party.size[1]}`;
                    }

                    // 경과 시간 처리
                    const timeWrapper = document.getElementById('activityTimeWrapper');
                    if (activity.timestamps && activity.timestamps.start) {
                        timeWrapper.style.display = 'flex';
                        const updateTime = () => {
                            const elapsed = Date.now() - activity.timestamps.start;
                            activityTime.innerText = `${formatTime(elapsed)}`;
                        };
                        updateTime();
                        activityInterval = setInterval(updateTime, 1000);
                    } else {
                        timeWrapper.style.display = 'none';
                    }
                } else {
                    activityLabel.innerText = '현재 활동';
                    activityImageWrapper.style.display = 'none';
                    activityText.innerText = data.discord_status === 'offline' ? '오프라인' : '활동 없음';
                    activityDetail.innerText = '';
                    activityText.classList.remove('active');
                }
            } catch (error) {
                console.error('Failed to fetch Discord status:', error);
            }
        }

        // 초기 실행 및 30초마다 업데이트
        updateDiscordStatus();
        setInterval(updateDiscordStatus, 30000);

        // 페이지 로드 시 즉시 실행
        fetchGitHubRepos();

        // 디스코드 아이디 복사 기능
        function copyDiscordId() {
            navigator.clipboard.writeText("seml_").then(() => {
                const textElement = document.getElementById('discordText');
                if (!textElement) return;
                const originalText = "seml_";
                textElement.innerText = "복사 완료!";
                textElement.style.color = "var(--accent)";
                
                setTimeout(() => {
                    textElement.innerText = originalText;
                    textElement.style.color = "var(--text-secondary)";
                }, 2000);
            }).catch(err => {
                alert("복사에 실패했습니다.");
            });
        }

        // Placeholder for updateGitHubImages if it's defined elsewhere or needed
        function updateGitHubImages() {
            // 현재 프로젝트에서는 별도의 이미지가 없으나 호환성을 위해 유지
        }
    </script>
</body>
</html>

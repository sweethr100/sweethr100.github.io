<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport content="width=device-width,initial-scale=1.0">
    <title>Doaouvg</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">  
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button type="button" onclick="javascript:location.href='https://mail.naver.com/';" style="cursor:pointer;" class="mail-button btn btn-success naver-mail">NAVER 메일</button>
    <button type="button" onclick="javascript:location.href='https://mail.google.com/';" style="cursor:pointer;" class="mail-button btn btn-danger">Gmail</button>
    <button type="button" onclick="javascript:location.href='https://mail.daum.net/';" style="cursor:pointer;" class="mail-button btn btn-warning">DAUM 메일</button>

    <img id="google" onclick="javascript:location.href='https://www.google.co.kr/';" style="cursor:pointer;" src="google.png" alt="Google">
    <form action="https://www.google.co.kr/search" method="GET">
        <div class="mx-auto mt-3 search-bar input-group mb-3">
            <input name="q" type="text" class="form-control rounded-pill" placeholder="Google 검색" aria-describedby="button-addon2">
        </div>
    </form>

    <img id="naver" onclick="javascript:location.href='https://www.naver.com/';" style="cursor:pointer;" src="naver.jpg" width="300" alt="NAVER">
    <form action="https://search.naver.com/search.naver?query=" method="GET">
        <div class="mx-auto search-bar input-group mb-3">
            <input name="query" type="text" class="form-control rounded-pill" placeholder="Naver 검색" aria-describedby="button-addon2">
        </div>
    </form>

    <img id="daum" onclick="javascript:location.href='https://www.daum.net/';" style="cursor:pointer;" src="daum.png" width="300" alt="DAUM">
    <form action="https://search.daum.net/search?w=tot&DA=YZR&t__nil_searchbox=btn&sug=&sugo=&sq=&o=&" method="GET">
        <div class="mx-auto search-bar input-group mb-3">
            <input name="q" type="text" class="form-control rounded-pill" placeholder="DAUM 검색" aria-describedby="button-addon2">
        </div>
    </form>
</body>
</html>

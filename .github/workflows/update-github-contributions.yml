name: Update GitHub Contributions

on:
  workflow_dispatch:
  schedule:
    - cron: "17 15 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate contribution data
        run: node scripts/update-github-contributions.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: sweethr100

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/github-contributions.json; then
            echo "No contribution data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github-contributions.json
          git commit -m "Update GitHub contribution data"
          git push
